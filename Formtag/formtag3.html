<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formtag3</title>
</head>
<body>
    <div>
        <form action="local">
            <!-- Username -->
             <label for="Username">Username:  </label>
             <input type="text" id="Username" name="Username" placeholder="Enter Your Name">
             <br><br><br>

            <!-- Email -->
             <label for="Email">Email:  </label>
             <input type="text" id="Email" name="Email" placeholder="Enter your Email">
             <br><br><br>

            <!-- password -->
             <label for="Password">password</label>
             <input type="password" id="password" name="password" placeholder="Type Your Password">
             <br><br><br>
             
            <!-- Number -->
             <label for="Number">Number:  </label>
             <input type="Number" id="Number" name="Number" placeholder="Enter Your Number" min="1" max="99">
             <br><br><br>

            <!-- Date -->
             <label for="Date">Date:  </label>
             <input type="date" id="date" name="date">
             <br><br><br>
             
             <!-- Time -->
              <label for="Time">Time:  </label>
              <input type="time" id="time" name="time">
              <br><br><br>

              <!-- color -->
               <label for="Color">Color:  </label>
               <input type="color" id="color" name="color">
               <br><br><br>

               <!-- subscribe -->
                <label for="subscribe">subscribe:  </label>
                <input type="checkbox" id="subscribe" name="subscribe">
                <br><br><br>

                <!-- Gender -->
                 <label for="Gender">Gender:  </label>
                 <br><br><br>

                <!-- male -->
                 <label for="male">male:  </label>
                 <input type="radio" id="radio" name="radio">
                 <br><br><br>

                 <!-- female -->
                  <label for="female">female:  </label>
                  <input type="radio" id="female" name="female">
                  <br><br><br>

                <!-- Country -->
                 <label for="country">Country:  </label>
                 <select name="country" id="country">
                    <option value="select">select:  </option>
                    <option value="India">India:  </option>
                    <option value="USA">USA:  </option>
                    <option value="UK">UK:  </option>
                    <option value="CANADA">CANADA:  </option>
                    <option value="RUSSIA">RUSSIA:  </option>
                 </select>
                 <br><br><br>

                 <!-- Comment -->
                  <label for="comment">Comment:  </label>
                  <br><br><br>
                  <textarea name="comment" id="comment" placeholder="Type Your Comment: " cols="36" rows="4"></textarea>
                  <br><br><br>

                <!-- file -->
                 <label for="file">file:  </label>
                 <input type="file" id="file" name="file">
                 <br><br><br>

                <!-- Range -->
                 <label for="range">Range:  </label>
                 <input type="range" id="range" name="range" min="1" max="100">
                 <br><br><br>
                
                 <!-- website -->
                  <label for="website">Website:  </label>
                  <input type="url" id="website" name="website" placeholder="https://example.com">
                  <br><br><br>

                <!-- Sumbmit form -->
                 <label for="Sumbit form">Submit form:  </label>
                 <input type="submit" id="submit form" name="submit form">
                 <br><br><br>

                <!-- reset form -->
                 <label for="reset form">reset form:  </label>
                 <input type="reset" id="reset form" name="reset form">
                 <br><br><br>

                 <!-- button -->
                  <button>submit</button>
        </form>
    </div>
</body>
</html>
