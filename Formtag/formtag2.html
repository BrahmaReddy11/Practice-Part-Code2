<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formtag2</title>
</head>
<body>
    <form action="">
        <label for="Username">Username: </label>
        <input type="text" id="Username" placeholder="Enter your name">
        <br><br>
        <label for="Email">Email: </label>
        <input type="email" id="Email" placeholder="Enter your Email">
        <br><br>
        <label for="password">Password: </label>
        <input type="password" id="password" placeholder="Enter your password">
        <br><br>
        <label for="Number">Number:  </label>
        <input type="number" id="Number" placeholder="Enter your number" min="0" max="100">
        <br><br>
        <label for="Date">Date:  </label>
        <input type="date" id="Date">
        <br><br>
        <label for="Time">Time:  </label>
        <input type="time" id="Time">
        <br><br>
        <label for="Color">Color:   </label>
        <input type="color" id="Color">
        <br><br>
        <label for="Subscribe">Subscribe:  </label>
        <input type="checkbox" id="Subscribe">
        <br><br>
        <label for="Gender">Gender:  </label>
        <br><br>
        <label for="Male">Male:  </label>
        <input type="radio" id="Male">
        <br><br>
        <label for="female">female:  </label>
        <input type="radio" id="female">
        <br><br>
        <label for="Country">Country:   </label>
        <select name="Country" id="Country">
            <option value="select">select</option>
            <option value="India">India</option>
            <option value="USA">USA</option>
            <option value="UK">UK</option>
        </select>   
        <br><br>
        <label for="Comment">Comment:  </label>
        <br><br>
        <textarea name="Comment" id="Comment" placeholder="Type Your Text: " rows="4" cols="50"></textarea>
        <br><br>
        <label for="file">file: </label>
        <input type="file" id="file" placeholder="file">
        <br><br>
        <label for="range">range:  </label>
        <input type="range" id="range" min="0" max="100">
        <br><br>
        <label for="Website">Website:  </label>
        <input type="url" id="Website" placeholder="Submit Form">
        <br><br>
        <button type="Submit form" value="submit form">Sumbit Form</button>
        <br><br>
        <button for="Reset form">Reset Form</button>
        <br><br> 
        <button>Submit</button>
    </form>
</body>
</html>
