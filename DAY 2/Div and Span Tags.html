<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Div and Span Tags</title>
</head>
<body>
    <!-- Div Tag ELEMENT -->
     <div>Hello 1</div>
     <div>Hello hi</div>
     <div>Hello 1</div>

     <!-- Span Tag type1 this will takes some space -->
      <span>Hello</span>
      <span>Hello</span>
      <span>Hello</span>
      <span>Hello</span>
      <span>Hello</span>
      <br>
      <!-- Span Tag type2 this will not takeany space -->
       <span>Hello</span><span>Hello</span><span>Hello</span><span>Hello</span><span>Hello</span>
</body>
</html>
