<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Div and Span Tags</title>
</head>
<body>
    <!-- Div tag is a block-level element -->
    <div>Hello, I am a div!</div>
    <div>Hello, I am another div!</div>

    <!-- Span tag is an inline-level element -->
    <p>Hello, I am a paragraph with a <span style="color: red;">red</span> span.</p>
</body>
</html>
