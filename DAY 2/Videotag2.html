<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videotag2</title>
</head>
<body>
    <!-- Method 1 -->
    <div>
        <!-- Video tag with controls play loop when the time we can click on that video with cursor  -->
        <video src="Snapinsta.app_317462245_104078542502194_2835227705241322734_n.mp4" controls width="200px" height="300px"></video>
    </div>
    <br>
    <!-- Method 2 -->
    <div>
        <!-- Video tag with controls play loop when the time we can click on that video with cursor  -->
        <video src="Snapinsta.app_video_46660820_1006474157237063_2619715379797848412_n.mp4" controls play loop width="200px" height="300px">with using controls play loop</video>

        <!-- Video tag with controls play loop is muted when the time we can click on that video with cursor  -->
        <video src="Snapinsta.app_video_46660820_1006474157237063_2619715379797848412_n.mp4" controls play loop muted ="200px" height="300px">with using controls play loop muted</video>
    </div>
</body>
</html>
