<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videotag</title>
</head>
<body>
    <div>
        <!-- Video tag without controls -->
        <video src="Snapinsta.app_video_46660820_1006474157237063_2619715379797848412_n.mp4" width="200px" height="300px"><p>without using controls autoplay</p></video>
        <!-- Video tag with controls autoplay loop -->
        <video src="Snapinsta.app_video_46660820_1006474157237063_2619715379797848412_n.mp4" controls autoplay loop width="200px" height="300px">with using controls</video>
        <!-- Video tag with controls autoplay loop with muted -->
        <video src="Snapinsta.app_video_46660820_1006474157237063_2619715379797848412_n.mp4" controls autoplay loop muted width="200px" height="300px"></video>
        
    </div>
    <br>
    <div>
        <!-- Video tag with controls play loop when the time we can click on that video with cursor  -->
        <video src="Snapinsta.app_video_46660820_1006474157237063_2619715379797848412_n.mp4" controls play loop width="200px" height="300px"></video>
        <!-- Video tag with controls play loop is muted when the time we can click on that video with cursor  -->
        <video src="Snapinsta.app_video_46660820_1006474157237063_2619715379797848412_n.mp4" controls play loop width="200px" height="300px"></video>
    </div>
</body>
</html>
