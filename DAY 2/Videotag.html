<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videotag</title>
</head>
<body>
    <div>
        <!-- Video tag without controls -->
        <video src="Snapinsta.app_video_46660820_1006474157237063_2619715379797848412_n.mp4" width="200px" height="300px">without using controls autoplay loop</video>
        
        <!-- Video tag with controls autoplay loop -->
        <video src="Snapinsta.app_video_46660820_1006474157237063_2619715379797848412_n.mp4" controls autoplay loop width="200px" height="300px">with using controls autoplay loop</video>

        <!-- Video tag with controls autoplay loop with muted -->
        <video src="Snapinsta.app_video_46660820_1006474157237063_2619715379797848412_n.mp4" controls autoplay loop muted width="200px" height="300px">with using controls autoplay loop muted</video>
    </div>
</body>
</html>
